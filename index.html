<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hex-Smash: Arena Online PRO</title>
    <style>
        body { margin: 0; overflow: hidden; background: #a29bfe; font-family: 'Segoe UI', sans-serif; touch-action: none; color: white; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100% !important; height: 100% !important; }
        
        #overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(108, 92, 231, 0.9), rgba(162, 155, 254, 0.8)); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(15px); transition: 0.5s; }
        .menu-card { background: rgba(255, 255, 255, 0.15); padding: 40px; border-radius: 40px; display: flex; flex-direction: column; gap: 15px; min-width: 340px; border: 2px solid rgba(255, 255, 255, 0.3); box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-align: center; max-height: 90vh; overflow-y: auto; }
        
        h1 { font-size: 60px; margin: 0; text-shadow: 0 10px 20px rgba(0,0,0,0.2); letter-spacing: -2px; text-align: center; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .btn { padding: 18px 35px; font-size: 20px; background: #55efc4; color: #2d3436; border: none; cursor: pointer; border-radius: 20px; font-weight: 900; transition: 0.3s; box-shadow: 0 5px 0 #00b894; }
        .btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 0 #00b894; filter: brightness(1.1); }
        .btn:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 #00b894; }
        .btn:disabled { background: #b2bec3; box-shadow: 0 5px 0 #636e72; cursor: not-allowed; opacity: 0.7; }
        .btn.secondary { background: #81ecec; box-shadow: 0 5px 0 #00cec9; }
        .btn-back { background: #fab1a0; box-shadow: 0 5px 0 #e17055; margin-top: 10px; }
        
        input, select { padding: 12px; border-radius: 15px; border: none; font-size: 16px; background: rgba(255,255,255,0.9); color: #2d3436; width: 100%; box-sizing: border-box; text-align: center; font-weight: bold; }
        label { font-weight: 900; font-size: 14px; color: #ffeaa7; text-align: left; display: block; margin-top: 5px; }
        
        #battle-ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 800px; display: none; justify-content: space-between; align-items: center; pointer-events: none; z-index: 10; }
        .player-tag { background: rgba(0,0,0,0.6); padding: 10px 20px; font-weight: 900; font-size: 18px; border-left: 5px solid #55efc4; min-width: 150px; text-align: center; }

        #mobile-controls { position: absolute; inset: 0; pointer-events: none; display: none; z-index: 50; }
        #joystick-base { position: absolute; width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; pointer-events: none; border: 2px solid rgba(255,255,255,0.4); display: none; transform: translate(-50%, -50%); }
        #joystick-knob { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #fff; border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        #touch-zone { position: absolute; top: 0; left: 0; width: 50%; height: 100%; pointer-events: auto; }

        .action-group { position: absolute; bottom: 40px; right: 40px; display: flex; gap: 20px; pointer-events: auto; }
        .mob-btn { width: 80px; height: 80px; border-radius: 50%; border: 4px solid #fff; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 14px; box-shadow: 0 8px 15px rgba(0,0,0,0.3); color: white; -webkit-user-select: none; }
        #action-btn { background: #ff7675; }
        #jump-btn { background: #00cec9; }

        .hidden { display: none !important; }
        #room-id-display { font-size: 32px; color: #ffeaa7; font-weight: 900; margin: 10px 0; }
        #status-msg { font-size: 18px; font-weight: bold; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; }
        .error-msg { color: #ff7675 !important; }
        .loading-dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }

        #end-screen { position: absolute; inset: 0; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 150; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); }
        #end-text { font-size: 100px; font-weight: 900; color: #fff; text-shadow: 0 0 30px rgba(255,255,255,0.5); animation: endZoom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; text-transform: uppercase;}
        @keyframes endZoom { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .win-glow { color: #55efc4 !important; text-shadow: 0 0 50px rgba(85, 239, 196, 0.8) !important; }
        .lose-glow { color: #ff7675 !important; text-shadow: 0 0 50px rgba(255, 118, 117, 0.8) !important; }

        @media screen and (max-width: 600px) { h1 { font-size: 40px; } .menu-card { padding: 20px; min-width: 280px; } #end-text { font-size: 60px; } }
    </style>
</head>
<body>
    <div id="end-screen"><div id="end-text"></div></div>
    <div id="battle-ui">
        <div class="player-tag" id="tag-p1">P1</div>
        <div class="player-tag" id="tag-p2">P2</div>
    </div>
    <div id="overlay">
        <h1 id="txt-title">HEX-SMASH</h1>
        <div id="menu-main" class="menu-card">
            <button id="nav-play" class="btn">PLAY</button>
            <button id="nav-settings" class="btn secondary">SETTINGS</button>
        </div>
        <div id="menu-play" class="menu-card hidden">
            <button id="btn-cpu" class="btn">1v1 (CPU)</button>
            <button id="nav-match-select" class="btn secondary">ONLINE MATCH & ROOM</button>
            <button class="btn btn-back nav-to-main">BACK</button>
        </div>
        <div id="menu-match-select" class="menu-card hidden">
            <button id="btn-matchmaking" class="btn">ONLINE MATCH</button>
            <button id="nav-room" class="btn secondary">ONLINE ROOM</button>
            <button id="btn-match-back" class="btn btn-back">BACK</button>
        </div>
        <div id="menu-room" class="menu-card hidden">
            <button id="btn-create" class="btn">CREATE ROOM</button>
            <div id="join-controls" style="display:flex; gap:10px;">
                <input type="text" id="room-input" placeholder="ID" maxlength="4" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                <button id="btn-join" class="btn">JOIN</button>
            </div>
            <div id="room-id-display"></div>
            <div id="status-msg"></div>
            <button id="btn-room-back" class="btn btn-back">BACK</button>
        </div>
        <div id="menu-settings" class="menu-card hidden">
            <label id="txt-nick">NICKNAME:</label>
            <input type="text" id="nick-input" maxlength="13">
            <label id="txt-country">REGION / COUNTRY:</label>
            <select id="country-select">
                <option value="JP">JP - Japan</option>
                <option value="US">US - United States</option>
                <option value="GB">GB - United Kingdom</option>
                <option value="KR">KR - South Korea</option>
                <option value="CN">CN - China</option>
                <option value="FR">FR - France</option>
                <option value="DE">DE - Germany</option>
                <option value="IT">IT - Italy</option>
                <option value="ES">ES - Spain</option>
                <option value="BR">BR - Brazil</option>
                <option value="RU">RU - Russia</option>
                <option value="IN">IN - India</option>
                <option value="CA">CA - Canada</option>
                <option value="AU">AU - Australia</option>
            </select>
            <label id="txt-lang">LANGUAGE:</label>
            <select id="lang-select">
                <option value="ja">日本語</option>
                <option value="en">English</option>
                <option value="ko">한국어</option>
                <option value="zh">中文</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="es">Español</option>
            </select>
            <button class="btn btn-back nav-to-main" id="btn-save">SAVE & BACK</button>
        </div>
    </div>
    <div id="mobile-controls">
        <div id="touch-zone"></div>
        <div id="joystick-base"><div id="joystick-knob"></div></div>
        <div class="action-group">
            <div id="jump-btn" class="mob-btn">JUMP</div>
            <div id="action-btn" class="mob-btn">SMASH</div>
        </div>
    </div>

    <script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    }}
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { initializeApp } from 'firebase/app';
        import { getDatabase, ref, set, onValue, update, onDisconnect, get, remove, runTransaction } from 'firebase/database';

        const firebaseConfig = {
            apiKey: "AIzaSyBCpKtPQrNhlmoXMnKIlu-nVDrAkTNj70Y",
            authDomain: "hexsmashonline.firebaseapp.com",
            projectId: "hexsmashonline",
            storageBucket: "hexsmashonline.firebasestorage.app",
            messagingSenderId: "636400445047",
            appId: "1:636400445047:web:d35346840aebb9f5e70872",
            databaseURL: "https://hexsmashonline-default-rtdb.firebaseio.com"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const getInitialNick = () => {
            let count = parseInt(localStorage.getItem('userCount') || "0") + 1;
            localStorage.setItem('userCount', count);
            return "Player" + count.toString().padStart(4, '0');
        };

        const loadSettings = () => {
            const saved = JSON.parse(localStorage.getItem('hexSmashSettings') || `{"nick":"${getInitialNick()}","lang":"en","country":"US"}`);
            const nickInput = document.getElementById('nick-input');
            nickInput.value = "@" + saved.nick.replace(/^@/, '');
            document.getElementById('lang-select').value = saved.lang;
            document.getElementById('country-select').value = saved.country || "US";
            return saved;
        };

        const saveSettings = () => {
            const rawNick = document.getElementById('nick-input').value.replace(/^@/, '') || "Player";
            const langVal = document.getElementById('lang-select').value;
            const countryVal = document.getElementById('country-select').value;
            localStorage.setItem('hexSmashSettings', JSON.stringify({nick: rawNick, lang: langVal, country: countryVal}));
            nickname = rawNick; lang = langVal; country = countryVal; applyL();
        };

        const nickInput = document.getElementById('nick-input');
        nickInput.addEventListener('input', (e) => {
            if (!e.target.value.startsWith('@')) e.target.value = '@' + e.target.value.replace(/^@/, '');
        });
        nickInput.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && e.target.selectionStart <= 1) e.preventDefault();
        });

        let gameState = 'MENU', isOnline = false, myRole = 'p1', roomId = null, settings = loadSettings();
        let nickname = settings.nick, lang = settings.lang, country = settings.country || "US", cancelLoading = false;
        const agents = [];

        const i18n = {
            ja: { title: "ヘックス・スマッシュ", play: "プレイ", settings: "設定", cpu: "CPU対戦", room: "ルーム対戦", create: "部屋を作る", join: "参加", back: "戻る", nick: "ニックネーム:", lang: "言語:", country: "地域/国:", win: "勝利！", lose: "敗北..." },
            en: { title: "HEX-SMASH", play: "PLAY", settings: "SETTINGS", cpu: "1v1 (CPU)", room: "ONLINE ROOM", create: "CREATE ROOM", join: "JOIN", back: "BACK", nick: "NICKNAME:", lang: "LANGUAGE:", country: "REGION / COUNTRY:", win: "YOU WIN", lose: "YOUR LOSS" },
            ko: { title: "헥스 스매시", play: "플레이", settings: "설정", cpu: "CPU 대전", room: "방 대전", create: "방 만들기", join: "참가", back: "뒤로", nick: "닉네임:", lang: "언어:", country: "지역/국가:", win: "승리!", lose: "패배..." },
            zh: { title: "六角大乱斗", play: "开始游戏", settings: "设置", cpu: "CPU对战", room: "房间模式", create: "创建房间", join: "加入", back: "返回", nick: "昵称:", lang: "语言:", country: "地区/国家:", win: "胜利！", lose: "失败..." },
            fr: { title: "HEX-SMASH", play: "JOUER", settings: "OPTIONS", cpu: "1v1 (CPU)", room: "EN LIGNE", create: "CRÉER", join: "REJOINDRE", back: "RETOUR", nick: "PSEUDO:", lang: "LANGUE:", country: "PAYS:", win: "VICTOIRE !", lose: "DÉFAITE..." },
            de: { title: "HEX-SMASH", play: "SPIELEN", settings: "SETUP", cpu: "1v1 (CPU)", room: "ONLINE-RAUM", create: "ERSTELLEN", join: "BEITRETEN", back: "ZURÜCK", nick: "NICKNAME:", lang: "SPRACHE:", country: "LAND:", win: "SIEG!", lose: "VERLOREN..." },
            es: { title: "HEX-SMASH", play: "JUGAR", settings: "AJUSTES", cpu: "1v1 (CPU)", room: "SALA ONLINE", create: "CREAR", join: "UNIRSE", back: "VOLVER", nick: "APODO:", lang: "IDIOMA:", country: "PAÍS:", win: "¡VICTORIA!", lose: "DERROTA..." }
        };

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa29bfe);
        scene.fog = new THREE.Fog(0xa29bfe, 20, 100);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = false;
        document.body.appendChild(renderer.domElement);
        
        const sun = new THREE.DirectionalLight(0xffffff, 2);
        sun.position.set(10, 20, 10);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        const arenaRadius = 12;
        const arena = new THREE.Mesh(new THREE.CylinderGeometry(arenaRadius, arenaRadius+1, 2, 6), new THREE.MeshStandardMaterial({ color: 0x636e72 }));
        arena.position.y = -1; scene.add(arena);

        function createNameLabel(name, countryCode) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512; canvas.height = 128;
            ctx.fillStyle = 'white'; ctx.font = '900 48px Arial';
            ctx.textAlign = 'center'; 
            ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 8;
            ctx.fillText(`${countryCode} @${name.replace(/^@/,'')}`, 256, 80);
            const tex = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex }));
            sprite.scale.set(4, 1, 1);
            sprite.position.y = 2.8;
            return sprite;
        }

        class Fighter {
            constructor(color, name, countryCode, isPlayer, startPos, role) {
                this.name = name; this.countryCode = countryCode; this.isPlayer = isPlayer; this.role = role;
                this.alive = true; this.velocity = new THREE.Vector3(); this.onGround = true;
                this.mesh = new THREE.Group();
                const b = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1, 4, 8), new THREE.MeshStandardMaterial({ color }));
                b.position.y = 1; this.mesh.add(b);
                
                this.batPivot = new THREE.Group(); this.batPivot.position.set(0.6, 1.2, 0);
                const batGeom = new THREE.CylinderGeometry(0.18, 0.08, 1.8, 12);
                const batMat = new THREE.MeshStandardMaterial({ color: 0x96694c, roughness: 0.6 });
                const bat = new THREE.Mesh(batGeom, batMat);
                bat.rotation.x = Math.PI/2; bat.position.z = 0.6; 
                this.batPivot.add(bat);
                this.mesh.add(this.batPivot);

                this.label = createNameLabel(name, countryCode);
                this.mesh.add(this.label);

                this.mesh.position.copy(startPos);
                scene.add(this.mesh); agents.push(this);
                this.targetPos = new THREE.Vector3().copy(startPos);
                this.targetRotY = 0; this.swingCooldown = 0; this.lastSent = 0;
                this.radius = 0.6;
                this.lerpSpeed = 0.35;
            }
            swing() {
                if (this.swingCooldown > 0) return;
                this.swingCooldown = 30; this.isSwinging = true; this.swingTime = 0;
                if (isOnline && this.role === myRole) update(ref(db, `rooms/${roomId}/${myRole}`), { swinging: Date.now() });
            }
            update(keys) {
                if (!this.alive) return;
                if (isOnline && this.role !== myRole) {
                    // 予測補間
                    this.mesh.position.lerp(this.targetPos, this.lerpSpeed);
                    let diff = this.targetRotY - this.mesh.rotation.y;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    this.mesh.rotation.y += diff * this.lerpSpeed;
                    if (this.isSwinging) this.handleSwingLogic();
                    return;
                }
                
                if (this.swingCooldown > 0) this.swingCooldown--;
                this.velocity.y -= 0.015; this.mesh.position.add(this.velocity);
                const d = Math.sqrt(this.mesh.position.x**2 + this.mesh.position.z**2);
                
                if (this.mesh.position.y < 0.2 && d >= arenaRadius && d < arenaRadius + 1) {
                    const s = new THREE.Vector3(this.mesh.position.x, 0, this.mesh.position.z).normalize();
                    this.velocity.x += s.x * 0.05; this.velocity.z += s.z * 0.05; this.onGround = false;
                }
                if (this.mesh.position.y < 0 && d < arenaRadius) { this.mesh.position.y = 0; this.velocity.y = 0; this.onGround = true; }
                else if (this.mesh.position.y < -10) this.eliminate();

                let move = new THREE.Vector3();
                if (this.isPlayer) {
                    if (keys.up) move.z -= 0.15; if (keys.down) move.z += 0.15;
                    if (keys.left) move.x -= 0.15; if (keys.right) move.x += 0.15;
                    if (keys.jump && this.onGround) { this.velocity.y = 0.3; this.onGround = false; }
                } else if (!isOnline) {
                    const target = agents[0].mesh.position;
                    const toT = new THREE.Vector3().subVectors(target, this.mesh.position);
                    const dist = toT.length();
                    const centerDir = new THREE.Vector3(-this.mesh.position.x, 0, -this.mesh.position.z).normalize();
                    if (d > arenaRadius * 0.75) {
                        move.add(centerDir.clone().multiplyScalar(0.15));
                        if (this.onGround && d > arenaRadius * 0.85) { this.velocity.y = 0.25; this.velocity.x = centerDir.x * 0.3; this.velocity.z = centerDir.z * 0.3; this.onGround = false; }
                    } else {
                        if (dist > 2.0) move.add(toT.clone().normalize().multiplyScalar(0.12));
                        else if (dist < 1.3) move.sub(toT.clone().normalize().multiplyScalar(0.1));
                        if (dist < 2.5 && Math.random() < 0.05) this.swing();
                    }
                }

                agents.forEach(o => {
                    if (o !== this && o.alive) {
                        const diff = new THREE.Vector3().subVectors(this.mesh.position, o.mesh.position);
                        diff.y = 0;
                        if (diff.length() < 1.2) {
                            const push = diff.normalize().multiplyScalar(0.05);
                            this.mesh.position.add(push);
                            o.mesh.position.sub(push);
                        }
                    }
                });

                this.mesh.position.add(move);
                if (move.length() > 0.01) this.mesh.rotation.y = Math.atan2(move.x, move.z);
                if (this.isSwinging) this.handleSwingLogic();
                this.velocity.x *= 0.94; this.velocity.z *= 0.94;

                if (isOnline && this.role === myRole && roomId && Date.now() - this.lastSent > 45) {
                    update(ref(db, `rooms/${roomId}/${myRole}`), { 
                        x: parseFloat(this.mesh.position.x.toFixed(2)), 
                        y: parseFloat(this.mesh.position.y.toFixed(2)), 
                        z: parseFloat(this.mesh.position.z.toFixed(2)), 
                        ry: parseFloat(this.mesh.rotation.y.toFixed(2)) 
                    });
                    this.lastSent = Date.now();
                }
            }
            handleSwingLogic() {
                this.swingTime += 0.2;
                this.batPivot.rotation.y = Math.sin(this.swingTime * 2) * 2;
                if (this.role === myRole || !isOnline) {
                    agents.forEach(o => {
                        if (o !== this && o.alive && this.mesh.position.distanceTo(o.mesh.position) < 2.6 && this.swingTime > 0.5 && this.swingTime < 1.0) {
                            const p = new THREE.Vector3().subVectors(o.mesh.position, this.mesh.position).normalize();
                            const power = 0.58;
                            const vx = p.x * power, vy = 0.18, vz = p.z * power;
                            if (isOnline) update(ref(db, `rooms/${roomId}/${o.role}/hit`), { vx, vy, vz, t: Date.now() });
                            else o.velocity.set(vx, vy, vz);
                            if(navigator.vibrate) navigator.vibrate(25); // ハプティック
                            this.isSwinging = false;
                        }
                    });
                }
                if (this.swingTime > 2) { this.isSwinging = false; this.batPivot.rotation.y = 0; }
            }
            eliminate() { 
                this.alive = false; this.mesh.visible = false; 
                if(gameState === 'PLAYING') {
                    gameState = 'ENDED';
                    const endText = document.getElementById('end-text');
                    const isWinner = (isOnline) ? (this.role !== myRole) : (!this.isPlayer);
                    endText.innerText = isWinner ? i18n[lang].win : i18n[lang].lose;
                    endText.className = isWinner ? 'win-glow' : 'lose-glow';
                    document.getElementById('end-screen').style.display = 'flex';
                    if(navigator.vibrate) navigator.vibrate([50, 50, 50]);
                }
                setTimeout(() => location.reload(), 4000); 
            }
        }

        const p1 = new Fighter(0x0984e3, nickname, country, true, new THREE.Vector3(-6, 5, 0), 'p1');
        const p2 = new Fighter(0xd63031, "CPU", "??", false, new THREE.Vector3(6, 5, 0), 'p2');
        const input = { up: false, down: false, left: false, right: false, jump: false };
        window.onkeydown = e => { if(e.code==='KeyW'||e.code==='ArrowUp') input.up=true; if(e.code==='KeyS'||e.code==='ArrowDown') input.down=true; if(e.code==='KeyA'||e.code==='ArrowLeft') input.left=true; if(e.code==='KeyD'||e.code==='ArrowRight') input.right=true; if(e.code==='Space') input.jump=true; };
        window.onkeyup = e => { if(e.code==='KeyW'||e.code==='ArrowUp') input.up=false; if(e.code==='KeyS'||e.code==='ArrowDown') input.down=false; if(e.code==='KeyA'||e.code==='ArrowLeft') input.left=false; if(e.code==='KeyD'||e.code==='ArrowRight') input.right=false; if(e.code==='Space') input.jump=false; };
        window.onmousedown = (e) => { if(gameState==='PLAYING' && e.button === 0) (myRole==='p1'?p1:p2).swing(); };

        // ダイナミック・ジョイスティック
        const touchZone = document.getElementById('touch-zone');
        const joyBase = document.getElementById('joystick-base');
        const joyKnob = document.getElementById('joystick-knob');
        touchZone.ontouchstart = (e) => {
            const t = e.touches[0];
            joyBase.style.display = 'block';
            joyBase.style.left = t.clientX + 'px';
            joyBase.style.top = t.clientY + 'px';
            joyBase.dataset.startX = t.clientX;
            joyBase.dataset.startY = t.clientY;
        };
        touchZone.ontouchmove = (e) => {
            const t = e.touches[0];
            const dx = t.clientX - joyBase.dataset.startX;
            const dy = t.clientY - joyBase.dataset.startY;
            const dist = Math.min(45, Math.sqrt(dx*dx + dy*dy));
            const angle = Math.atan2(dy, dx);
            joyKnob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            input.left = dx < -15; input.right = dx > 15; input.up = dy < -15; input.down = dy > 15;
        };
        touchZone.ontouchend = () => {
            joyBase.style.display = 'none';
            input.up = input.down = input.left = input.right = false;
        };
        document.getElementById('action-btn').ontouchstart = (e) => { e.preventDefault(); if(gameState==='PLAYING') (myRole==='p1'?p1:p2).swing(); };
        document.getElementById('jump-btn').ontouchstart = (e) => { e.preventDefault(); if(gameState==='PLAYING') input.jump = true; };
        document.getElementById('jump-btn').ontouchend = () => { input.jump = false; };

        const showM = id => { document.querySelectorAll('.menu-card').forEach(m => m.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); };
        document.getElementById('nav-play').onclick = () => showM('menu-play');
        document.getElementById('nav-settings').onclick = () => showM('menu-settings');
        document.getElementById('nav-match-select').onclick = () => showM('menu-match-select');
        document.getElementById('nav-room').onclick = () => showM('menu-room');
        document.getElementById('btn-save').onclick = () => { saveSettings(); showM('menu-main'); };
        document.querySelectorAll('.nav-to-main:not(#btn-save)').forEach(b => b.onclick = () => showM('menu-main'));
        document.getElementById('btn-match-back').onclick = () => showM('menu-play');
        document.getElementById('btn-room-back').onclick = async () => { cancelLoading = true; location.reload(); };

        const applyL = () => { 
            const t = i18n[lang]; document.getElementById('txt-title').innerText = t.title; 
            document.getElementById('nav-play').innerText = t.play; document.getElementById('nav-settings').innerText = t.settings; 
            document.getElementById('btn-cpu').innerText = t.cpu; document.getElementById('btn-create').innerText = t.create; 
            document.getElementById('btn-join').innerText = t.join; document.querySelectorAll('.btn-back').forEach(b => b.innerText = t.back); 
            document.getElementById('txt-nick').innerText = t.nick; document.getElementById('txt-lang').innerText = t.lang;
            document.getElementById('txt-country').innerText = t.country;
            p1.name = nickname; p1.countryCode = country;
            p1.mesh.remove(p1.label); p1.label = createNameLabel(nickname, country); p1.mesh.add(p1.label);
        };

        const startGame = () => { 
            gameState = 'PLAYING'; 
            document.getElementById('overlay').classList.add('hidden'); 
            document.getElementById('battle-ui').style.display = 'flex'; 
            if(/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) document.getElementById('mobile-controls').style.display = 'block';
        };

        document.getElementById('btn-cpu').onclick = () => { 
            isOnline=false; p1.isPlayer=true; p2.isPlayer=false; 
            document.getElementById('tag-p1').innerText = `${country} @${nickname}`; document.getElementById('tag-p2').innerText = `?? @CPU`;
            startGame(); 
        };

        // ルーム機能（既存）
        document.getElementById('btn-create').onclick = async () => {
            document.getElementById('btn-create').classList.add('hidden'); document.getElementById('join-controls').classList.add('hidden');
            roomId = Math.floor(1000 + Math.random() * 9000).toString(); 
            isOnline = true; myRole = 'p1'; p1.isPlayer = true; p2.isPlayer = false;
            const msg = document.getElementById('status-msg');
            msg.className = 'loading-dots'; msg.innerText = "Creating room"; await sleep(1000);
            document.getElementById('room-id-display').innerText = `ID: ${roomId}`;
            const roomRef = ref(db, `rooms/${roomId}`);
            await set(roomRef, { p1: { active: true, name: nickname, country: country, ready: true }, p2: { active: false, ready: false } });
            onDisconnect(roomRef).remove();
            onValue(ref(db, `rooms/${roomId}/p2`), s => { 
                const d = s.val(); if(d && d.ready && gameState !== 'PLAYING') {
                    document.getElementById('tag-p1').innerText = `${country} @${nickname}`;
                    document.getElementById('tag-p2').innerText = `${d.country} @${d.name || 'P2'}`;
                    p2.mesh.remove(p2.label); p2.label = createNameLabel(d.name, d.country); p2.mesh.add(p2.label);
                    startGame(); 
                }
            });
            syncO();
        };

        document.getElementById('btn-join').onclick = async () => {
            const id = document.getElementById('room-input').value; if(id.length < 4) return;
            const msg = document.getElementById('status-msg');
            document.getElementById('btn-create').classList.add('hidden'); document.getElementById('join-controls').classList.add('hidden');
            msg.innerText = "Searching"; msg.className = "loading-dots"; await sleep(1000);
            const snap = await get(ref(db, `rooms/${id}`));
            if(!snap.exists()) { location.reload(); return; }
            roomId = id; isOnline = true; myRole = 'p2'; p1.isPlayer = false; p2.isPlayer = true;
            await update(ref(db, `rooms/${roomId}/p2`), { active: true, name: nickname, country: country, ready: true });
            onDisconnect(ref(db, `rooms/${roomId}/p2`)).update({ active: false, ready: false });
            syncO();
            const p1Data = snap.val().p1;
            document.getElementById('tag-p1').innerText = `${p1Data.country} @${p1Data.name}`; document.getElementById('tag-p2').innerText = `${country} @${nickname}`;
            p1.mesh.remove(p1.label); p1.label = createNameLabel(p1Data.name, p1Data.country); p1.mesh.add(p1.label);
            startGame();
        };

        // オンラインマッチ機能
        document.getElementById('btn-matchmaking').onclick = async () => {
            showM('menu-room');
            document.getElementById('btn-create').classList.add('hidden');
            document.getElementById('join-controls').classList.add('hidden');
            const msg = document.getElementById('status-msg');
            msg.innerText = "Matching"; msg.className = "loading-dots";
            
            let timeleft = 15;
            const timer = setInterval(() => {
                timeleft--;
                if(timeleft <= 0) {
                    clearInterval(timer);
                    remove(ref(db, `matchmaking/${nickname}`));
                    location.reload();
                }
            }, 1000);

            const matchRef = ref(db, 'matchmaking');
            const snap = await get(matchRef);
            let targetId = null;
            if (snap.exists()) {
                const waiting = snap.val();
                targetId = Object.keys(waiting)[0];
            }

            if (targetId) {
                // 相手が見つかった
                clearInterval(timer);
                await remove(ref(db, `matchmaking/${targetId}`));
                roomId = targetId.slice(0,4);
                myRole = 'p2'; p1.isPlayer = false; p2.isPlayer = true; isOnline = true;
                await update(ref(db, `rooms/${roomId}/p2`), { active: true, name: nickname, country: country, ready: true });
                const rSnap = await get(ref(db, `rooms/${roomId}/p1`));
                const p1d = rSnap.val();
                document.getElementById('tag-p1').innerText = `${p1d.country} @${p1d.name}`;
                document.getElementById('tag-p2').innerText = `${country} @${nickname}`;
                p1.mesh.remove(p1.label); p1.label = createNameLabel(p1d.name, p1d.country); p1.mesh.add(p1.label);
                syncO();
                startGame();
            } else {
                // 待機列に並ぶ
                roomId = Math.floor(1000 + Math.random() * 9000).toString();
                await set(ref(db, `matchmaking/${nickname}`), { room: roomId });
                await set(ref(db, `rooms/${roomId}/p1`), { active: true, name: nickname, country: country, ready: true });
                myRole = 'p1'; p1.isPlayer = true; p2.isPlayer = false; isOnline = true;
                onValue(ref(db, `rooms/${roomId}/p2`), s => {
                    const d = s.val(); if(d && d.ready && gameState !== 'PLAYING') {
                        clearInterval(timer);
                        document.getElementById('tag-p1').innerText = `${country} @${nickname}`;
                        document.getElementById('tag-p2').innerText = `${d.country} @${d.name}`;
                        p2.mesh.remove(p2.label); p2.label = createNameLabel(d.name, d.country); p2.mesh.add(p2.label);
                        startGame();
                    }
                });
                syncO();
            }
        };

        function syncO() {
            const opponent = (myRole==='p1')?p2:p1, me = (myRole==='p1')?p1:p2, oppRole = (myRole==='p1')?'p2':'p1';
            onValue(ref(db, `rooms/${roomId}/${oppRole}`), s => {
                const d = s.val(); if(!d) return;
                if(d.x !== undefined) { opponent.targetPos.set(d.x, d.y, d.z); opponent.targetRotY = d.ry; }
                if(d.swinging && !opponent.isSwinging) opponent.swing();
            });
            onValue(ref(db, `rooms/${roomId}/${myRole}/hit`), s => {
                const val = s.val(); 
                if(val && val.t) { 
                    me.velocity.set(val.vx, val.vy, val.vz); me.onGround = false;
                    set(ref(db, `rooms/${roomId}/${myRole}/hit`), null);
                    if(navigator.vibrate) navigator.vibrate(40);
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if (gameState === 'PLAYING') { p1.update(input); p2.update(input); }
            
            // カメラオートズーム
            const mid = new THREE.Vector3().addVectors(p1.mesh.position, p2.mesh.position).multiplyScalar(0.5);
            const dist = p1.mesh.position.distanceTo(p2.mesh.position);
            const zoom = Math.max(12, Math.min(25, dist + 8));
            camera.position.lerp(new THREE.Vector3(mid.x, zoom * 0.8, mid.z + zoom), 0.1);
            camera.lookAt(mid);
            camera.fov = 50 + (dist * 0.5); camera.updateProjectionMatrix();

            renderer.render(scene, camera);
        }
        const sleep = m => new Promise(r => setTimeout(r, m));
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        applyL(); animate();
    </script>
</body>
</html>
