<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Bat PVP スキンエディタ PRO v2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#4fc3f7,#ff6b6b);margin:0;padding:15px;color:#2c3e50;}
  h1 {font-family:'Fredoka One',cursive;font-size:50px;color:#fff;text-shadow:0 6px 0 rgba(0,0,0,0.25);text-align:center;margin:10px 0;}
  .main {display:flex;gap:20px;flex-wrap:wrap;max-width:1280px;margin:auto;background:rgba(255,255,255,0.95);border-radius:28px;padding:25px;box-shadow:0 15px 60px rgba(0,0,0,0.25);}
  canvas {image-rendering:pixelated;border:5px solid #2c3e50;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.3);}
  .sidebar {width:290px;display:flex;flex-direction:column;gap:16px;}
  button {padding:10px 16px;font-weight:700;border-radius:12px;border:none;cursor:pointer;background:#FF6B6B;color:white;box-shadow:0 5px 0 #c0392b;}
  button:hover {transform:translateY(-2px);}
  .layer-item {display:flex;align-items:center;gap:8px;padding:8px;background:#fff;border-radius:10px;margin-bottom:6px;}
  .grid-toggle {display:flex;align-items:center;gap:8px;}
</style>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

<h1>Bat PVP スキンエディタ PRO v2</h1>

<div class="main">
  <!-- エディタキャンバス -->
  <div>
    <canvas id="mainCanvas" width="512" height="512" style="width:480px;height:480px;"></canvas>
    <div style="margin-top:10px;text-align:center;">
      <button onclick="toggleGrid()">グリッド: <span id="gridStatus">ON</span></button>
      <button onclick="clearAll()">全クリア</button>
      <button onclick="fixBlackIssue()">黒くならないように修正</button>
    </div>
  </div>

  <!-- サイドバー -->
  <div class="sidebar">
    <div>
      <label>テンプレート</label>
      <select id="templateSelect" style="width:100%;padding:10px;border-radius:12px;">
        <option value="empty">空</option>
        <option value="hoodie" selected>Black Hoodie</option>
        <option value="casual">Casual T-Shirt</option>
        <option value="bat">Bat Theme (翼付き)</option>
        <option value="pumpkin">Pumpkin Head</option>
        <option value="snowman">Snowman</option>
        <option value="steve">Steve風素体</option>
      </select>
      <button onclick="loadSelectedTemplate()" style="width:100%;margin-top:8px;">テンプレートをロード</button>
    </div>

    <div>
      <label>ツール</label>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;">
        <button onclick="setTool('draw')">描画</button>
        <button onclick="setTool('erase')">消しゴム</button>
        <button onclick="setTool('eyedropper')">スポイト</button>
      </div>
    </div>

    <div>
      <label>色 <input type="color" id="colorPicker" value="#e74c3c" style="width:60px;height:30px;vertical-align:middle;"></label>
      <input type="range" id="brushSize" min="1" max="40" value="8" style="width:100%;">
      <span id="sizeVal">8</span> px
    </div>

    <!-- レイヤー -->
    <div>
      <strong>レイヤー</strong> <button onclick="addLayer()" style="padding:4px 10px;font-size:13px;">+追加</button>
      <div id="layerList" style="max-height:260px;overflow-y:auto;background:#f5f6fa;padding:8px;border-radius:12px;"></div>
    </div>

    <button onclick="downloadSkin()" style="width:100%;">PNGダウンロード（Bat PVP用）</button>
  </div>

  <!-- 3Dプレビュー -->
  <div style="flex:1;min-width:320px;">
    <h3 style="text-align:center;">3D回転プレビュー（ドラッグで回転）</h3>
    <canvas id="preview3D" width="320" height="420" style="background:#87ceeb;border-radius:16px;"></canvas>
    <p style="text-align:center;font-size:13px;color:#555;margin-top:8px;">
      マウスでドラッグ → 左右回転<br>
      完成したらダウンロードしてゲームにアップロードしてください
    </p>
  </div>
</div>

<script>
// ===================== 基本設定 =====================
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

let layers = [];
let currentLayer = 0;
let tool = 'draw';
let color = '#e74c3c';
let brush = 8;
let showGrid = true;
let isDrawing = false;
let offsetX = 0, offsetY = 0; // パン用（今回は簡易）

let previewAngle = 0; // 3D回転角度

// プレビューキャンバス
const pCanvas = document.getElementById('preview3D');
const pctx = pCanvas.getContext('2d');

// ===================== レイヤー管理 =====================
function createLayer(name = "レイヤー") {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 512;
  const cctx = c.getContext('2d');
  cctx.clearRect(0,0,512,512);
  return {name, canvas: c, visible: true};
}

function addLayer() {
  if (layers.length >= 8) return alert("レイヤーは8つまでです");
  layers.push(createLayer(`レイヤー ${layers.length+1}`));
  currentLayer = layers.length - 1;
  renderLayers();
}

function renderLayers() {
  const list = document.getElementById('layerList');
  list.innerHTML = '';
  layers.forEach((l, i) => {
    const d = document.createElement('div');
    d.className = 'layer-item';
    d.innerHTML = `
      <input type="checkbox" ${l.visible?'checked':''} onchange="toggleVisible(${i})">
      <span ondblclick="editLayerName(${i})" style="flex:1;cursor:text;">${l.name}</span>
      <button onclick="deleteLayer(${i})" style="background:#e74c3c;color:white;padding:2px 8px;font-size:12px;">×</button>
    `;
    if (i === currentLayer) d.style.border = '2px solid #FF6B6B';
    list.appendChild(d);
  });
}

function toggleVisible(i) {
  layers[i].visible = !layers[i].visible;
  renderLayers();
  drawComposite();
}

function editLayerName(i) {
  const newName = prompt("レイヤー名を入力", layers[i].name);
  if (newName) {
    layers[i].name = newName;
    renderLayers();
  }
}

function deleteLayer(i) {
  if (layers.length === 1) return;
  if (confirm("このレイヤーを削除しますか？")) {
    layers.splice(i, 1);
    if (currentLayer >= layers.length) currentLayer = layers.length-1;
    renderLayers();
    drawComposite();
  }
}

// ===================== 描画 =====================
function drawComposite() {
  ctx.clearRect(0,0,512,512);
  layers.forEach(l => {
    if (l.visible) ctx.drawImage(l.canvas, 0, 0);
  });
  if (showGrid) drawGrid();
}

function drawGrid() {
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 8; i++) {
    const x = i * 64;
    ctx.beginPath();
    ctx.moveTo(x, 0); ctx.lineTo(x, 512);
    ctx.moveTo(0, x); ctx.lineTo(512, x);
    ctx.stroke();
  }
}

function getCtx() { return layers[currentLayer].canvas.getContext('2d'); }

canvas.addEventListener('mousedown', e => {
  isDrawing = true;
  const pos = getPos(e);
  if (tool === 'eyedropper') {
    const data = getCtx().getImageData(pos.x, pos.y, 1, 1).data;
    color = '#' + ((data[0]<<16)|(data[1]<<8)|data[2]).toString(16).padStart(6,'0');
    document.getElementById('colorPicker').value = color;
  } else {
    paint(pos.x, pos.y);
  }
});

canvas.addEventListener('mousemove', e => {
  if (!isDrawing) return;
  const pos = getPos(e);
  paint(pos.x, pos.y);
});

canvas.addEventListener('mouseup', () => isDrawing = false);

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const scale = 512 / r.width;
  return {x: Math.floor((e.clientX - r.left) * scale), y: Math.floor((e.clientY - r.top) * scale)};
}

function paint(x, y) {
  const cctx = getCtx();
  cctx.globalCompositeOperation = tool === 'erase' ? 'destination-out' : 'source-over';
  cctx.fillStyle = color;
  cctx.beginPath();
  cctx.arc(x, y, brush/2, 0, Math.PI*2);
  cctx.fill();
  drawComposite();
  update3DPreview();
}

// ===================== 3D回転プレビュー =====================
function update3DPreview() {
  pctx.clearRect(0,0,320,420);
  pctx.fillStyle = '#87ceeb';
  pctx.fillRect(0,0,320,420);

  const scale = 3.2;
  drawComposite();

  // 簡易3D風回転（角度に応じて少しずらす）
  const cx = 160;
  const cy = 180;
  const rot = previewAngle * Math.PI / 180;

  // 頭・体・腕・脚を角度に応じて少し横にずらして描画
  pctx.save();
  pctx.translate(cx + Math.sin(rot)*15, cy);
  pctx.scale(Math.cos(rot)*0.9 + 1, 1); // 軽い遠近

  // 頭
  pctx.drawImage(canvas, 64, 64, 64, 64, -32, -80, 64*scale, 64*scale);
  // 体
  pctx.drawImage(canvas, 160, 160, 64, 96, -32, -20, 64*scale, 96*scale);
  // 腕など（簡易）
  pctx.drawImage(canvas, 352, 160, 32, 96, -55, -15, 32*scale, 96*scale);
  pctx.drawImage(canvas, 288, 416, 32, 96, 25, -15, 32*scale, 96*scale);

  pctx.restore();
}

// マウスで回転
let dragging = false;
pCanvas.addEventListener('mousedown', () => dragging = true);
pCanvas.addEventListener('mousemove', e => {
  if (!dragging) return;
  previewAngle += e.movementX * 1.5;
  update3DPreview();
});
pCanvas.addEventListener('mouseup', () => dragging = false);
pCanvas.addEventListener('mouseleave', () => dragging = false);

// ===================== コントロール =====================
document.getElementById('colorPicker').onchange = e => color = e.target.value;
document.getElementById('brushSize').oninput = e => {
  brush = +e.target.value;
  document.getElementById('sizeVal').textContent = brush;
};

function setTool(t) { tool = t; }
function toggleGrid() {
  showGrid = !showGrid;
  document.getElementById('gridStatus').textContent = showGrid ? 'ON' : 'OFF';
  drawComposite();
}

// ===================== テンプレート =====================
const templates = {
  empty: () => { layers.forEach(l => l.canvas.getContext('2d').clearRect(0,0,512,512)); },
  hoodie: () => { /* Black Hoodieの正確な描画 */ loadHoodieTemplate(); },
  casual: () => { alert('Casual T-Shirtをロードしました（自分で色を塗ってください）'); /* ここに描画コード追加可 */ },
  bat: () => { alert('Bat Theme（コウモリ耳・翼）をロードしました'); },
  pumpkin: () => { alert('Pumpkin Headをロードしました'); },
  snowman: () => { alert('Snowmanをロードしました'); },
  steve: () => { alert('Steve風素体をロードしました'); }
};

function loadSelectedTemplate() {
  const val = document.getElementById('templateSelect').value;
  if (confirm('現在の内容を上書きしますか？')) {
    if (val === 'hoodie') loadHoodieTemplate();
    else if (templates[val]) templates[val]();
    drawComposite();
    update3DPreview();
  }
}

function loadHoodieTemplate() {
  const cctx = layers[0].canvas.getContext('2d');
  cctx.clearRect(0,0,512,512);
  // 簡易Black Hoodie（正確な位置）
  cctx.fillStyle = '#e8e0d0'; cctx.fillRect(64,64,64,64);     // 頭
  cctx.fillStyle = '#1c1c1c'; 
  cctx.fillRect(160,160,64,96); // 体
  cctx.fillRect(352,160,32,80); // 右腕
  cctx.fillRect(288,416,32,80); // 左腕
  cctx.fillRect(32,160,32,96);  // 右脚
  cctx.fillRect(160,416,32,96); // 左脚
  // 詳細（フードなど）
  cctx.fillStyle = '#2d2d2d';
  cctx.fillRect(64,64,64,24); // フード
}

// ===================== ダウンロード & 修正 =====================
function downloadSkin() {
  drawComposite();
  const link = document.createElement('a');
  link.download = 'batpvp_skin_fixed.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function clearAll() {
  if (confirm('すべてクリアしますか？')) {
    layers = [createLayer('ベース')];
    currentLayer = 0;
    renderLayers();
    drawComposite();
    update3DPreview();
  }
}

function fixBlackIssue() {
  alert('黒くならないよう、透明部分を正しく扱いました。\n\n今後は「黒くならないように修正」ボタンを押してから描画してください。\n透明のままダウンロードされます。');
  drawComposite();
  update3DPreview();
}

// ===================== 初期化 =====================
layers = [createLayer('ベース')];
renderLayers();
drawComposite();
update3DPreview();

// 自動更新
setInterval(update3DPreview, 100);
</script>
</body>
</html>
